name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: 安裝 Gio GUI 依賴
        run: >-
          sudo apt-get update && sudo apt-get install -y
          pkg-config
          libwayland-dev
          libx11-dev
          libx11-xcb-dev
          libxkbcommon-x11-dev
          libgles2-mesa-dev
          libegl1-mesa-dev
          libxcursor-dev
          libvulkan-dev
      - run: go test ./... -timeout 60s

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "1"
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: "1"
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安裝 Linux GUI 依賴 (amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          pkg-config libwayland-dev libx11-dev libx11-xcb-dev
          libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev
          libxcursor-dev libvulkan-dev

      - name: 安裝 Linux GUI 依賴 (arm64 交叉編譯)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config \
            libwayland-dev:arm64 libx11-dev:arm64 libx11-xcb-dev:arm64 \
            libxkbcommon-x11-dev:arm64 libgles2-mesa-dev:arm64 libegl1-mesa-dev:arm64 \
            libxcursor-dev:arm64 libvulkan-dev:arm64

      - name: 設定環境變數
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=radb-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_ENV"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          echo "EXT=$EXT" >> "$GITHUB_ENV"

          # Linux arm64 交叉編譯器設定
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            echo "CC=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
            echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          fi

      - name: 嵌入 Windows 圖示與版本資訊
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 "assets/RADB Icon.svg" -o icon-256.png
          go install github.com/tc-hib/go-winres@latest
          cd cmd/radb
          go-winres simply --icon ../../icon-256.png --arch ${{ matrix.goarch }} \
            --product-name "radb" \
            --file-description "遠端 ADB P2P 轉發工具"

      - name: 編譯
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/chris1004tw/remote-adb/internal/buildinfo.Version=${TAG} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Commit=${SHA} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Date=${DATE}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          go build -trimpath -ldflags="${LDFLAGS}" -o "dist/radb${EXT}" ./cmd/radb

      - name: UPX 壓縮（Windows ARM64 除外）
        if: "!(matrix.goos == 'windows' && matrix.goarch == 'arm64')"
        run: |
          # 安裝 UPX
          UPX_VERSION="4.2.4"
          curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" | tar -xJ
          UPX="./upx-${UPX_VERSION}-amd64_linux/upx"

          echo "壓縮前: $(du -h dist/radb${EXT} | cut -f1)"
          $UPX --best --lzma "dist/radb${EXT}"
          echo "壓縮後: $(du -h dist/radb${EXT} | cut -f1)"

      - name: 打包 Linux (tar.gz)
        if: matrix.goos == 'linux'
        run: tar -czf "${{ env.ARCHIVE_NAME }}.tar.gz" -C dist .

      - name: 打包 Windows (zip)
        if: matrix.goos == 'windows'
        run: cd dist && zip "../${{ env.ARCHIVE_NAME }}.zip" *

      - name: 複製 Windows 獨立執行檔
        if: matrix.goos == 'windows'
        run: cp "dist/radb.exe" "${{ env.ARCHIVE_NAME }}.exe"

      - name: 產生 checksum
        run: sha256sum radb-*.* > checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

      - name: 上傳 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            radb-*.*
            checksums-*.txt
          retention-days: 1

  build-macos-universal:
    name: Build darwin/universal
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 安裝圖示轉換工具
        run: brew install librsvg

      - name: 設定環境變數
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=radb-${TAG}-darwin-universal" >> "$GITHUB_ENV"

      - name: 編譯雙架構並合併 Universal Binary
        run: |
          mkdir -p dist
          SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/chris1004tw/remote-adb/internal/buildinfo.Version=${TAG} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Commit=${SHA} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Date=${DATE}"

          # 分別編譯 amd64 和 arm64
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="${LDFLAGS}" -o dist/radb-amd64 ./cmd/radb
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="${LDFLAGS}" -o dist/radb-arm64 ./cmd/radb

          # 使用 lipo 合併為 Universal Binary
          lipo -create -output dist/radb dist/radb-amd64 dist/radb-arm64
          lipo -info dist/radb

          # 清理單架構檔案
          rm dist/radb-amd64 dist/radb-arm64

      - name: 打包 macOS (DMG)
        run: |
          chmod +x scripts/build-dmg.sh
          scripts/build-dmg.sh dist/radb "${TAG}" "${{ env.ARCHIVE_NAME }}.dmg"

      - name: 產生 checksum
        run: sha256sum radb-*.* > checksums-darwin-universal.txt

      - name: 上傳 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            radb-*.*
            checksums-*.txt
          retention-days: 1

  release:
    name: Create Release
    needs: [build, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 產生版本說明
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="${TAG}"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # 依 commit type 分類，轉為口語化 release notes
          declare -A SECTIONS
          SECTIONS[feat]=""
          SECTIONS[fix]=""
          SECTIONS[refactor]=""
          SECTIONS[docs]=""
          SECTIONS[ci]=""
          SECTIONS[other]=""

          while IFS= read -r msg; do
            # 取出 type 和描述（格式：type: 描述）
            if [[ "$msg" =~ ^([a-z]+):\ (.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              DESC="${BASH_REMATCH[2]}"
            else
              TYPE="other"
              DESC="$msg"
            fi

            case "$TYPE" in
              feat)     SECTIONS[feat]+="- ${DESC}"$'\n' ;;
              fix)      SECTIONS[fix]+="- ${DESC}"$'\n' ;;
              refactor) SECTIONS[refactor]+="- ${DESC}"$'\n' ;;
              docs)     SECTIONS[docs]+="- ${DESC}"$'\n' ;;
              ci|build) SECTIONS[ci]+="- ${DESC}"$'\n' ;;
              *)        SECTIONS[other]+="- ${DESC}"$'\n' ;;
            esac
          done < <(git log --format="%s" "$RANGE")

          # 輸出分類後的 release notes
          {
            if [ -n "${SECTIONS[feat]}" ]; then
              echo "### 🚀 新功能"
              echo "${SECTIONS[feat]}"
            fi
            if [ -n "${SECTIONS[fix]}" ]; then
              echo "### 🐛 修復"
              echo "${SECTIONS[fix]}"
            fi
            if [ -n "${SECTIONS[refactor]}" ]; then
              echo "### 🔧 改進"
              echo "${SECTIONS[refactor]}"
            fi
            if [ -n "${SECTIONS[docs]}" ]; then
              echo "### 📝 文件"
              echo "${SECTIONS[docs]}"
            fi
            if [ -n "${SECTIONS[ci]}" ]; then
              echo "### ⚙️ CI / 建置"
              echo "${SECTIONS[ci]}"
            fi
            if [ -n "${SECTIONS[other]}" ]; then
              echo "### 其他"
              echo "${SECTIONS[other]}"
            fi
          } > release_notes.md

      - name: 下載所有 artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 合併 checksums
        run: cat artifacts/checksums-*.txt > artifacts/checksums.txt && rm artifacts/checksums-*.txt

      - name: 建立 Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
          files: artifacts/*
