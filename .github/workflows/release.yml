name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test ./... -timeout 60s

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 設定環境變數
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=radb-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_ENV"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          echo "EXT=$EXT" >> "$GITHUB_ENV"

      - name: 編譯
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/chris1004tw/remote-adb/internal/buildinfo.Version=${TAG} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Commit=${SHA} -X github.com/chris1004tw/remote-adb/internal/buildinfo.Date=${DATE}"
          go build -ldflags="${LDFLAGS}" -o "dist/radb${EXT}" ./cmd/radb
          go build -ldflags="${LDFLAGS}" -o "dist/radb-agent${EXT}" ./cmd/radb-agent
          go build -ldflags="${LDFLAGS}" -o "dist/radb-signal${EXT}" ./cmd/radb-signal

      - name: 打包 (tar.gz)
        if: matrix.goos != 'windows'
        run: tar -czf "${{ env.ARCHIVE_NAME }}.tar.gz" -C dist .

      - name: 打包 (zip)
        if: matrix.goos == 'windows'
        run: cd dist && zip "../${{ env.ARCHIVE_NAME }}.zip" *

      - name: 產生 checksum
        run: sha256sum radb-*.* > checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

      - name: 上傳 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            radb-*.*
            checksums-*.txt
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下載所有 artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 合併 checksums
        run: cat artifacts/checksums-*.txt > artifacts/checksums.txt && rm artifacts/checksums-*.txt

      - name: 建立 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
